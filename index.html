<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masya — Memory Diary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="neural-bg">
  <div class="node"></div><div class="node"></div><div class="node"></div>
  <div class="node"></div><div class="node"></div><div class="node"></div>
  <div class="node"></div><div class="node"></div><div class="node"></div>
  <div class="node"></div><div class="node"></div><div class="node"></div>
</div>

<div class="app">

  <header class="header">
    <div class="logo">Masya</div>
    <div class="credits-pill">⭐ <span id="credits-display">0</span></div>
  </header>

  <section id="page-home"     class="page active">Home</section>
  <section id="page-add"      class="page">Add Memory</section>
  <section id="page-search"   class="page">Search</section>
  <section id="page-timeline" class="page">Timeline</section>
  <section id="page-games"    class="page">Brain Games</section>
  <section id="page-family"   class="page">Family</section>

</div>

<nav class="nav">
  <button class="nav-item active" data-page="home">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    Home
  </button>
  <button class="nav-item" data-page="add">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
    Add
  </button>
  <button class="nav-item" data-page="search">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    Search
  </button>
  <button class="nav-item" data-page="timeline">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm.5 5v6l5.25 3.15-.75 1.23L11 14V7h1.5z"/></svg>
    Timeline
  </button>
  <button class="nav-item" data-page="games">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5S14.67 12 15.5 12s1.5.67 1.5 1.5S16.33 15 15.5 15zm3-3c-.83 0-1.5-.67-1.5-1.5S17.67 9 18.5 9s1.5.67 1.5 1.5S19.33 12 18.5 12z"/></svg>
    Games
  </button>
  <button class="nav-item" data-page="family">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    Family
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + btn.dataset.page).classList.add('active');
      btn.classList.add('active');
    });
  });
</script>

</body>
</html>
